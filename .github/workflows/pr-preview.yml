# Deploy PR preview to GitHub Pages and post a comment with the preview URL
name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy PR preview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          DEST_SUBDIR="pr-previews/pr-${{ github.event.number }}"
          DEPLOY_DIR=$(mktemp -d)

          # Clone the existing gh-pages branch so we don't clobber other PR previews,
          # or initialise a fresh repo when gh-pages doesn't exist yet.
          if git ls-remote --exit-code "$REPO_URL" gh-pages > /dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "$REPO_URL" "$DEPLOY_DIR"
          else
            git init "$DEPLOY_DIR"
            git -C "$DEPLOY_DIR" checkout -b gh-pages
            git -C "$DEPLOY_DIR" remote add origin "$REPO_URL"
          fi

          mkdir -p "$DEPLOY_DIR/$DEST_SUBDIR"
          rsync -a --delete \
            --exclude='.github' \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.squad' \
            --exclude='.copilot' \
            --exclude='package.json' \
            --exclude='prompt.txt' \
            --exclude='CLAUDE.md' \
            ./ "$DEPLOY_DIR/$DEST_SUBDIR/"

          git -C "$DEPLOY_DIR" config user.name "github-actions[bot]"
          git -C "$DEPLOY_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$DEPLOY_DIR" add -A
          if git -C "$DEPLOY_DIR" diff --staged --quiet; then
            echo "No changes to deploy."
          else
            git -C "$DEPLOY_DIR" commit -m "chore: deploy PR preview for #${{ github.event.number }}"
            git -C "$DEPLOY_DIR" push origin gh-pages
          fi

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const repoName = context.repo.repo;
            const owner = context.repo.owner;
            const url = `https://${owner}.github.io/${repoName}/pr-previews/pr-${prNumber}/`;

            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n## 🚀 PR Preview\n\nYour preview is ready: **[${url}](${url})**\n\n> _This preview will be automatically removed when the PR is closed._`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo: repoName,
              issue_number: prNumber,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo: repoName,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo: repoName,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PREVIEW_DIR="pr-previews/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git pull --rebase
            git rm -rf "$PREVIEW_DIR"
            git commit -m "chore: remove PR preview for #${{ github.event.number }}"
            git push
          else
            echo "Preview directory not found, skipping cleanup."
          fi
