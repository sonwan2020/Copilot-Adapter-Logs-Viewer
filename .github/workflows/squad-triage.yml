name: Squad Triage

# Triggers when any squad-related label is added to an issue.
# Routes the issue to the correct GitHub Copilot coding agent based on the label.
#
# Label → Agent mapping (see .squad/team.md for full pipeline details):
#   squad           → deckard-lead    (first entry point: triage & analysis)
#   squad:copilot   → deckard-lead    (copilot work goes through the full pipeline starting with Deckard)
#   squad:batty     → batty-core-dev  (implementation planning for @copilot)
#   squad:pris      → pris-tester     (QA testing)
#   squad:ralph     → ralph-monitor   (work queue monitoring)
#   squad:scribe    → scribe          (session logging, background)
#
# Pipeline: Issue → Deckard → Batty → @copilot → Deckard (review) → Pris (QA) → Merge

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  route-to-agent:
    if: >-
      github.event.label.name == 'squad' ||
      startsWith(github.event.label.name, 'squad:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Route issue to agent
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const label = context.payload.label.name;

            // Read team roster for context — see .squad/team.md for full pipeline
            let teamFile = '.squad/team.md';
            if (!fs.existsSync(teamFile)) {
              teamFile = '.ai-team/team.md';
            }
            if (!fs.existsSync(teamFile)) {
              core.warning('No .squad/team.md or .ai-team/team.md found — cannot route');
              return;
            }

            const teamContent = fs.readFileSync(teamFile, 'utf8');

            // Label → Agent file mapping
            // squad and squad:copilot both route to deckard-lead (pipeline entry point)
            const labelToAgent = {
              'squad':          { agent: 'deckard-lead',   name: 'Deckard', role: 'Lead',         emoji: '🏗️', action: 'triage and analyze this issue' },
              'squad:copilot':  { agent: 'deckard-lead',   name: 'Deckard', role: 'Lead',         emoji: '🏗️', action: 'triage and analyze this issue (copilot work goes through the full pipeline)' },
              'squad:deckard':  { agent: 'deckard-lead',   name: 'Deckard', role: 'Lead',         emoji: '🏗️', action: 'triage and analyze this issue' },
              'squad:batty':    { agent: 'batty-core-dev', name: 'Batty',   role: 'Core Dev',     emoji: '🔧', action: 'create an implementation plan for @copilot' },
              'squad:pris':     { agent: 'pris-tester',    name: 'Pris',    role: 'Tester',       emoji: '🧪', action: 'run QA validation' },
              'squad:ralph':    { agent: 'ralph-monitor',  name: 'Ralph',   role: 'Work Monitor', emoji: '🔄', action: 'check work queue status' },
              'squad:scribe':   { agent: 'scribe',         name: 'Scribe',  role: 'Scribe',       emoji: '📋', action: 'update session logs and decisions' },
            };

            const mapping = labelToAgent[label];
            if (!mapping) {
              core.info(`Label "${label}" has no agent mapping — skipping`);
              return;
            }

            // Verify the agent file exists
            const agentFile = `.github/agents/${mapping.agent}.agent.md`;
            if (!fs.existsSync(agentFile)) {
              core.warning(`Agent file ${agentFile} not found — cannot route`);
              return;
            }

            // Unassign all current assignees before routing to the new agent
            // This ensures a clean handoff when labels change (re-routing)
            if (issue.assignees && issue.assignees.length > 0) {
              const currentAssignees = issue.assignees.map(a => a.login);
              core.info(`Unassigning current assignees: ${currentAssignees.join(', ')}`);
              try {
                await github.rest.issues.removeAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: currentAssignees
                });
              } catch (err) {
                core.warning(`Could not unassign: ${err.message}`);
              }
            }

            // For squad:copilot, replace the label with squad and re-route to Deckard
            // This ensures copilot requests go through the full pipeline
            if (label === 'squad:copilot') {
              core.info(`squad:copilot detected — routing through Deckard for full pipeline triage`);

              // Remove squad:copilot and add squad:deckard to make the routing explicit
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'squad:copilot'
                });
              } catch (err) {
                core.warning(`Could not remove squad:copilot label: ${err.message}`);
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['squad', 'squad:deckard']
              });
            }

            // Assign @copilot to the issue so the agent picks it up
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['copilot']
              });
            } catch (err) {
              core.warning(`Could not assign @copilot: ${err.message}`);
            }

            // Post routing comment
            const comment = [
              `### ${mapping.emoji} Squad Routing — ${mapping.name} (${mapping.role})`,
              '',
              `**Issue:** #${issue.number} — ${issue.title}`,
              `**Label:** \`${label}\``,
              `**Agent:** \`${mapping.agent}\``,
              `**Action:** ${mapping.name}, please ${mapping.action}.`,
              '',
              '---',
              '',
              '**Agent Pipeline** (see `.squad/team.md`):',
              '```',
              'Issue → Deckard (triage) → Batty (plan) → @copilot (code) → Deckard (review) → Pris (QA) → Merge',
              '```',
              '',
              '> To reassign, remove the current `squad:*` label and add the correct one.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });

            core.info(`Routed issue #${issue.number} → ${mapping.agent} (${label})`);
